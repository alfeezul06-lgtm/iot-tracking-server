<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IoT Tracking System</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #fff;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 24px;
  background: #1e293b;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.counter {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

.box {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
}

.card {
  background: #1e293b;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
  display: flex;
  justify-content: space-between;
}

.status-in { color: #22c55e; }
.status-out { color: #ef4444; }

button {
  background: red;
  border: none;
  padding: 5px 10px;
  border-radius: 5px;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<header>📦 IoT Tracking System</header>

<div class="container">

  <!-- COUNTER -->
  <div class="counter">
    <div class="box">Total<br><h2 id="total">0</h2></div>
    <div class="box">IN<br><h2 id="in">0</h2></div>
    <div class="box">OUT<br><h2 id="out">0</h2></div>
  </div>

  <!-- CURRENT -->
  <h2>📋 Current Items</h2>
  <div id="items"></div>

  <!-- HISTORY -->
  <h2>🕒 History</h2>
  <div id="history"></div>

</div>

<script>
const API = "";

// 🔥 Auto detect (Render friendly)
if (window.location.hostname.includes("render.com")) {
  API = "";
} else {
  API = "";
}

// LOAD DATA
async function load() {
  const res = await fetch(API + "/data");
  const data = await res.json();

  let itemsDiv = document.getElementById("items");
  let historyDiv = document.getElementById("history");

  itemsDiv.innerHTML = "";
  historyDiv.innerHTML = "";

  let total = 0, inCount = 0, outCount = 0;

  // ITEMS
  for (let name in data.items) {
    total++;
    let status = data.items[name];

    if (status === "IN") inCount++;
    else outCount++;

    itemsDiv.innerHTML += `
      <div class="card">
        <div>
          <b>${name}</b><br>
          <span class="status-${status.toLowerCase()}">${status}</span>
        </div>
        <button onclick="removeItem('${name}')">Remove</button>
      </div>
    `;
  }

  // COUNTER
  document.getElementById("total").innerText = total;
  document.getElementById("in").innerText = inCount;
  document.getElementById("out").innerText = outCount;

  // HISTORY
  data.history.forEach(h => {
    historyDiv.innerHTML += `
      <div class="card">
        <div>
          <b>${h.name}</b> -
          <span class="status-${h.status.toLowerCase()}">${h.status}</span><br>
          <small>${h.time}</small>
        </div>
      </div>
    `;
  });
}

// REMOVE
async function removeItem(name) {
  await fetch("/remove/" + name, { method: "DELETE" });
  load();
}

// REALTIME
setInterval(load, 1000);
load();
</script>

</body>
</html>
