<!DOCTYPE html>
<html>
<head>
  <title>IoT Tracking System</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
    }

    h1 {
      text-align: center;
      padding: 20px;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-in { color: #22c55e; }
    .status-out { color: #ef4444; }

    button {
      background: red;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    .counter {
      display: flex;
      justify-content: space-around;
      margin-bottom: 20px;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 30%;
      text-align: center;
    }

    .history {
      margin-top: 30px;
    }
  </style>
</head>

<body>

<h1>📦 IoT Tracking System</h1>

<div class="container">

  <!-- COUNTER -->
  <div class="counter">
    <div class="box">Total Items<br><h2 id="total">0</h2></div>
    <div class="box">IN<br><h2 id="in">0</h2></div>
    <div class="box">OUT<br><h2 id="out">0</h2></div>
  </div>

  <!-- CURRENT ITEMS -->
  <h2>📋 Current Status</h2>
  <div id="items"></div>

  <!-- HISTORY -->
  <div class="history">
    <h2>🕒 History Log</h2>
    <div id="history"></div>
  </div>

</div>

<script>
const API = "https://iot-tracking-server-nkok.onrender.com";

// LOAD DATA
async function load() {
  const res = await fetch(API + "/data");
  const data = await res.json();

  const itemsDiv = document.getElementById("items");
  const historyDiv = document.getElementById("history");

  itemsDiv.innerHTML = "";
  historyDiv.innerHTML = "";

  let total = 0, inCount = 0, outCount = 0;

  // CURRENT ITEMS
  for (let name in data.items) {
    total++;
    let status = data.items[name];

    if (status === "IN") inCount++;
    else outCount++;

    itemsDiv.innerHTML += `
      <div class="card">
        <div>
          <b>${name}</b><br>
          <span class="status-${status.toLowerCase()}">${status}</span>
        </div>
        <button onclick="removeItem('${name}')">Remove</button>
      </div>
    `;
  }

  // UPDATE COUNTER
  document.getElementById("total").innerText = total;
  document.getElementById("in").innerText = inCount;
  document.getElementById("out").innerText = outCount;

  // HISTORY LOG
  data.history.forEach(h => {
    historyDiv.innerHTML += `
      <div class="card">
        <div>
          <b>${h.name}</b> - 
          <span class="status-${h.status.toLowerCase()}">${h.status}</span><br>
          <small>${h.time}</small>
        </div>
      </div>
    `;
  });
}

// REMOVE
async function removeItem(name) {
  await fetch(API + "/remove/" + name, { method: "DELETE" });
  load();
}

// AUTO REFRESH
setInterval(load, 1000);
load();
</script>

</body>
</html>
