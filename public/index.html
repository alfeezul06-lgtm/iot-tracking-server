<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IoT Tracking System</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #fff;
  }

  header {
    text-align: center;
    padding: 20px;
    font-size: 24px;
    font-weight: bold;
    background: #1e293b;
  }

  .container {
    padding: 20px;
    max-width: 900px;
    margin: auto;
  }

  /* COUNTER */
  .counter {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin-bottom: 25px;
  }

  .box {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
  }

  .box h2 {
    margin: 10px 0 0;
  }

  /* CARD */
  .card {
    background: #1e293b;
    padding: 12px 15px;
    border-radius: 10px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .status-in { color: #22c55e; font-weight: bold; }
  .status-out { color: #ef4444; font-weight: bold; }

  button {
    background: #ef4444;
    border: none;
    padding: 5px 10px;
    border-radius: 6px;
    color: white;
    cursor: pointer;
  }

  h2 {
    margin-top: 30px;
  }

  small {
    color: #94a3b8;
  }
</style>
</head>

<body>

<header>📦 IoT Tracking System</header>

<div class="container">

  <!-- COUNTER -->
  <div class="counter">
    <div class="box">
      Total Items
      <h2 id="total">0</h2>
    </div>
    <div class="box">
      IN
      <h2 id="in">0</h2>
    </div>
    <div class="box">
      OUT
      <h2 id="out">0</h2>
    </div>
  </div>

  <!-- CURRENT ITEMS -->
  <h2>📋 Current Status</h2>
  <div id="items"></div>

  <!-- HISTORY -->
  <h2>🕒 History Log</h2>
  <div id="history"></div>

</div>

<script>
const API = "https://iot-tracking-server-nkok.onrender.com";

// LOAD DATA
async function loadData() {
  try {
    const res = await fetch(API + "/data");
    const data = await res.json();

    const itemsDiv = document.getElementById("items");
    const historyDiv = document.getElementById("history");

    itemsDiv.innerHTML = "";
    historyDiv.innerHTML = "";

    let total = 0, inCount = 0, outCount = 0;

    // CURRENT ITEMS
    for (let name in data.items) {
      total++;
      const status = data.items[name];

      if (status === "IN") inCount++;
      else outCount++;

      itemsDiv.innerHTML += `
        <div class="card">
          <div>
            <b>${name}</b><br>
            <span class="status-${status.toLowerCase()}">${status}</span>
          </div>
          <button onclick="removeItem('${name}')">Remove</button>
        </div>
      `;
    }

    // UPDATE COUNTER
    document.getElementById("total").innerText = total;
    document.getElementById("in").innerText = inCount;
    document.getElementById("out").innerText = outCount;

    // HISTORY
    data.history.forEach(h => {
      historyDiv.innerHTML += `
        <div class="card">
          <div>
            <b>${h.name}</b> -
            <span class="status-${h.status.toLowerCase()}">${h.status}</span><br>
            <small>${h.time}</small>
          </div>
        </div>
      `;
    });

  } catch (err) {
    console.log("Error:", err);
  }
}

// REMOVE ITEM
async function removeItem(name) {
  await fetch(API + "/remove/" + name, {
    method: "DELETE"
  });
  loadData();
}

// AUTO REFRESH (REALTIME)
setInterval(loadData, 1000);
loadData();
</script>

</body>
</html>
